services:
  # ─── Infrastructure ───────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ecommerce-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ecommerce}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecommerce_secret}
      POSTGRES_DB: ecommerce
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecommerce"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ecommerce-net

  redis:
    image: redis:7-alpine
    container_name: ecommerce-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ecommerce-net

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: ecommerce-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-ecommerce}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-ecommerce_secret}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ecommerce-net

  consul:
    image: hashicorp/consul:1.20
    container_name: ecommerce-consul
    command: agent -server -bootstrap-expect=1 -ui -client=0.0.0.0
    ports:
      - "8500:8500"
    # Keep the registry ephemeral so a stale data dir can't block startup
    # (single-node dev: services re-register on boot).
    tmpfs:
      - /consul/data
    healthcheck:
      test: ["CMD", "consul", "members"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-net

  # ─── Microservices ────────────────────────────────────────────────────────
  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    container_name: ecommerce-user-service
    environment:
      SERVICE_NAME: user-service
      SERVICE_ADDRESS: user-service
      PORT: 3001
      POSTGRES_HOST: postgres
      POSTGRES_DB: user_db
      POSTGRES_USER: ${POSTGRES_USER:-ecommerce}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecommerce_secret}
      CONSUL_HOST: consul
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-ecommerce}:${RABBITMQ_PASSWORD:-ecommerce_secret}@rabbitmq:5672
    depends_on:
      postgres:
        condition: service_healthy
      consul:
        condition: service_healthy
    networks:
      - ecommerce-net

  product-service:
    build:
      context: .
      dockerfile: services/product-service/Dockerfile
    container_name: ecommerce-product-service
    environment:
      SERVICE_NAME: product-service
      SERVICE_ADDRESS: product-service
      PORT: 3002
      POSTGRES_HOST: postgres
      POSTGRES_DB: product_db
      POSTGRES_USER: ${POSTGRES_USER:-ecommerce}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecommerce_secret}
      CONSUL_HOST: consul
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-ecommerce}:${RABBITMQ_PASSWORD:-ecommerce_secret}@rabbitmq:5672
    depends_on:
      postgres:
        condition: service_healthy
      consul:
        condition: service_healthy
    networks:
      - ecommerce-net

  cart-service:
    build:
      context: .
      dockerfile: services/cart-service/Dockerfile
    container_name: ecommerce-cart-service
    environment:
      SERVICE_NAME: cart-service
      SERVICE_ADDRESS: cart-service
      PORT: 3003
      REDIS_HOST: redis
      CONSUL_HOST: consul
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-ecommerce}:${RABBITMQ_PASSWORD:-ecommerce_secret}@rabbitmq:5672
    depends_on:
      redis:
        condition: service_healthy
      consul:
        condition: service_healthy
    networks:
      - ecommerce-net

  order-service:
    build:
      context: .
      dockerfile: services/order-service/Dockerfile
    container_name: ecommerce-order-service
    environment:
      SERVICE_NAME: order-service
      SERVICE_ADDRESS: order-service
      PORT: 3004
      POSTGRES_HOST: postgres
      POSTGRES_DB: order_db
      POSTGRES_USER: ${POSTGRES_USER:-ecommerce}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecommerce_secret}
      CONSUL_HOST: consul
      PRODUCT_SERVICE_URL: http://product-service:3002
      CART_SERVICE_URL: http://cart-service:3003
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-ecommerce}:${RABBITMQ_PASSWORD:-ecommerce_secret}@rabbitmq:5672
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      product-service:
        condition: service_started
      cart-service:
        condition: service_started
      consul:
        condition: service_healthy
    networks:
      - ecommerce-net

  payment-service:
    build:
      context: .
      dockerfile: services/payment-service/Dockerfile
    container_name: ecommerce-payment-service
    environment:
      SERVICE_NAME: payment-service
      SERVICE_ADDRESS: payment-service
      PORT: 3005
      POSTGRES_HOST: postgres
      POSTGRES_DB: payment_db
      POSTGRES_USER: ${POSTGRES_USER:-ecommerce}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecommerce_secret}
      CONSUL_HOST: consul
      STRIPE_MOCK: "true"
      PAYPAL_MOCK: "true"
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-ecommerce}:${RABBITMQ_PASSWORD:-ecommerce_secret}@rabbitmq:5672
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      consul:
        condition: service_healthy
    networks:
      - ecommerce-net

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    container_name: ecommerce-notification-service
    environment:
      SERVICE_NAME: notification-service
      SERVICE_ADDRESS: notification-service
      PORT: 3006
      CONSUL_HOST: consul
      SENDGRID_MOCK: "true"
      TWILIO_MOCK: "true"
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-ecommerce}:${RABBITMQ_PASSWORD:-ecommerce_secret}@rabbitmq:5672
    depends_on:
      rabbitmq:
        condition: service_healthy
      consul:
        condition: service_healthy
    networks:
      - ecommerce-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ecommerce-frontend
    ports:
      - "5173:80"
    depends_on:
      - api-gateway
    networks:
      - ecommerce-net

  api-gateway:
    build:
      context: .
      dockerfile: gateway/api-gateway/Dockerfile
    container_name: ecommerce-api-gateway
    ports:
      - "8080:8080"
    environment:
      SERVICE_NAME: api-gateway
      SERVICE_ADDRESS: api-gateway
      PORT: 8080
      CONSUL_HOST: consul
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
    depends_on:
      - user-service
      - product-service
      - cart-service
      - order-service
      - payment-service
      - notification-service
      - consul
    networks:
      - ecommerce-net

  # ─── Monitoring (Prometheus + Grafana) ──────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: ecommerce-prometheus
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - api-gateway
    networks:
      - ecommerce-net

  grafana:
    image: grafana/grafana:11.4.0
    container_name: ecommerce-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - ecommerce-net

  # ─── Centralized Logging (ELK) ──────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: ecommerce-elasticsearch
    profiles: ["logging"]
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - ecommerce-net

  logstash:
    image: docker.elastic.co/logstash/logstash:8.15.3
    container_name: ecommerce-logstash
    profiles: ["logging"]
    volumes:
      - ./infrastructure/logstash/pipeline:/usr/share/logstash/pipeline:ro
    ports:
      - "5044:5044"
      - "5000:5000"
    depends_on:
      - elasticsearch
    networks:
      - ecommerce-net

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.3
    container_name: ecommerce-kibana
    profiles: ["logging"]
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - ecommerce-net

volumes:
  postgres_data:
  elasticsearch_data:

networks:
  ecommerce-net:
    driver: bridge
