name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - user-service
          - product-service
          - cart-service
          - order-service
          - payment-service
          - notification-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install shared dependencies
        run: cd shared && npm install

      - name: Validate service package
        run: |
          cd services/${{ matrix.service }}
          npm install
          node --check src/index.js

  build-gateway:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install and validate gateway
        run: |
          cd shared && npm install
          cd ../gateway/api-gateway
          npm install
          node --check src/index.js

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [lint-and-build, build-gateway, build-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build all service images
        run: |
          docker compose build user-service product-service cart-service
          docker compose build cart-service order-service payment-service notification-service
          docker compose build api-gateway frontend

  integration-test:
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@v4

      - name: Start platform
        run: |
          docker compose up -d postgres redis rabbitmq consul
          sleep 15
          docker compose up -d user-service product-service cart-service payment-service notification-service
          sleep 20
          docker compose up -d order-service api-gateway
          sleep 25

      - name: Smoke test API Gateway
        run: |
          curl -sf http://localhost:8080/health
          curl -sf http://localhost:8080/api/products | grep -q products
          REGISTER=$(curl -sf -X POST http://localhost:8080/api/users/register \
            -H "Content-Type: application/json" \
            -d '{"email":"ci@test.com","password":"testpass123","firstName":"CI"}')
          echo "$REGISTER" | grep -q token
          TOKEN=$(echo "$REGISTER" | node -e "process.stdin.on('data',d=>console.log(JSON.parse(d).token))")
          curl -sf http://localhost:8080/api/users/profile/$(echo "$REGISTER" | node -e "process.stdin.on('data',d=>console.log(JSON.parse(d).user.id))") \
            -H "Authorization: Bearer $TOKEN"

      - name: Tear down
        if: always()
        run: docker compose down -v
